---
- name: install Apache2
  apt:
        name: apache2
        state: present
        update_cache: yes

- name: Open port 80
  ufw:
    rule: allow
    port: '80'
    proto: tcp

- name: start Apache
  service:
    name: apache2
    state: started
    enabled: yes
    
- name: update index page
  template:
    src: templates/index.html.j2
    dest: /var/www/html/index.html
  notify: restart apache

- name: check resourse
  uri:
    url: "http://{{ ansible_facts.all_ipv4_addresses[1] }}/"
    status_code: 200
  register: result

- name: result
  debug:
    msg: "State: {{ result.status }}"